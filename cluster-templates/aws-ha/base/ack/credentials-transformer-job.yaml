---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["iam.services.k8s.aws"]
    resources: ["accesskeys"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aws-credentials-transformer
subjects:
  - kind: ServiceAccount
    name: aws-credentials-transformer
    namespace: cluster-placeholder
---
apiVersion: batch/v1
kind: Job
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      name: aws-credentials-transformer
    spec:
      serviceAccountName: aws-credentials-transformer
      restartPolicy: OnFailure
      containers:
        - name: transformer
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for ACK AccessKey resource to be ready..."
              # Wait for the AccessKey resource to be synced and ready
              until kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE &>/dev/null; do
                echo "Waiting for AccessKey resource..."
                sleep 5
              done

              # Wait for the resource to be synced (ACK has reconciled it)
              echo "Waiting for AccessKey to be synced..."
              until kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE -o jsonpath='{.status.conditions[?(@.type=="ACK.ResourceSynced")].status}' | grep -q "True"; do
                echo "Waiting for ACK to sync AccessKey..."
                sleep 5
              done

              echo "Extracting credentials from ACK AccessKey resource..."

              # ACK stores the access key ID in the status
              ACCESS_KEY_ID=$(kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE -o jsonpath='{.status.accessKeyID}')

              # ACK creates a secret with the secret access key
              # The secret name is typically ack-{resource-name} or controlled by the resource spec
              # For AccessKey, ACK stores the secret in the resource's secretRef field
              SECRET_NAME=$(kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE -o jsonpath='{.status.secretKeyRef.name}')
              SECRET_NAMESPACE=$(kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE -o jsonpath='{.status.secretKeyRef.namespace}')

              if [ -z "$SECRET_NAME" ]; then
                echo "ERROR: ACK has not created the secret yet"
                exit 1
              fi

              # Wait for the secret to exist
              until kubectl get secret "$SECRET_NAME" -n "${SECRET_NAMESPACE:-$NAMESPACE}" &>/dev/null; do
                echo "Waiting for ACK-generated secret $SECRET_NAME..."
                sleep 5
              done

              # Extract the secret access key from the ACK-created secret
              # ACK typically stores it in a field called 'secretAccessKey'
              SECRET_ACCESS_KEY=$(kubectl get secret "$SECRET_NAME" -n "${SECRET_NAMESPACE:-$NAMESPACE}" -o jsonpath='{.data.secretAccessKey}')

              # Verify we got the credentials
              if [ -z "$ACCESS_KEY_ID" ]; then
                echo "ERROR: Failed to get access key ID from AccessKey status"
                kubectl get accesskey.iam.services.k8s.aws ocp-installer-access-key -n $NAMESPACE -o yaml
                exit 1
              fi

              if [ -z "$SECRET_ACCESS_KEY" ]; then
                echo "ERROR: Failed to extract secret access key from secret $SECRET_NAME"
                kubectl get secret "$SECRET_NAME" -n "${SECRET_NAMESPACE:-$NAMESPACE}" -o yaml
                exit 1
              fi

              # Encode the access key ID to base64
              ACCESS_KEY_ID_B64=$(echo -n "$ACCESS_KEY_ID" | base64)

              echo "Creating aws-credentials secret in Hive format..."
              # Create the secret in the format expected by Hive
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: aws-credentials
                namespace: $NAMESPACE
              type: Opaque
              data:
                aws_access_key_id: $ACCESS_KEY_ID_B64
                aws_secret_access_key: $SECRET_ACCESS_KEY
              EOF

              echo "Successfully created aws-credentials secret!"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
