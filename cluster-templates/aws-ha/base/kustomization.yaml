apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Crossplane namespace-scoped resources
  - crossplane/iam-user.yaml
  - crossplane/iam-policy.yaml
  - crossplane/iam-attachment.yaml
  - crossplane/iam-access-key.yaml
  - crossplane/credentials-transformer-job.yaml
  # Cluster resources
  - clusterdeployment.yaml
  - machinepool-worker.yaml
  - managedcluster.yaml
  - install-config-secret.yaml
  - deprovision-finalizer-job.yaml

# Cluster-scoped resources (no namespace transformation)
components:
  - crossplane/cluster-scoped

# Common labels applied to all resources
labels:
  - pairs:
      provisioner: hive
      managed-by: argocd
    includeSelectors: true

# Namespace for namespace-scoped resources only (will be overridden by overlay)
namespace: cluster-placeholder
