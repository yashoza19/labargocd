apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Crossplane resources (must be created first)
  - crossplane/provider.yaml
  - crossplane/iam-user.yaml
  - crossplane/iam-policy.yaml
  - crossplane/iam-attachment.yaml
  - crossplane/iam-access-key.yaml
  - crossplane/credentials-transformer-job.yaml
  # Cluster resources
  - clusterdeployment.yaml
  - machinepool-worker.yaml
  - managedcluster.yaml
  - install-config-secret.yaml
  - deprovision-finalizer-job.yaml

# Common labels applied to all resources
labels:
  - pairs:
      provisioner: hive
      managed-by: argocd
    includeSelectors: true

# Namespace for namespace-scoped resources only (will be overridden by overlay)
# Note: Cluster-scoped resources (Provider, ProviderConfig, ManagedCluster)
# should not have namespace set
namespace: cluster-placeholder

# Prevent namespace from being applied to cluster-scoped resources
configurations:
  - kustomizeconfig.yaml
