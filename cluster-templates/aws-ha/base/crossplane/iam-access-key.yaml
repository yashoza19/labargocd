apiVersion: iam.aws.upbound.io/v1beta1
kind: AccessKey
metadata:
  name: ocp-installer-access-key
  labels:
    app.kubernetes.io/part-of: ocp-installer
spec:
  forProvider:
    userRef:
      name: ocp-installer
  writeConnectionSecretToRef:
    name: ocp-installer-credentials
    namespace: default
