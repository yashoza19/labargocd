apiVersion: iam.aws.upbound.io/v1beta1
kind: Policy
metadata:
  name: openshift4-installer-policy
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  labels:
    app.kubernetes.io/part-of: ocp-installer
spec:
  forProvider:
    description: "Permissions required for OpenShift 4.20 installation on AWS"
    name: OpenShift4InstallerPolicy
    tags:
      Purpose: OpenShift-Installer
      CreatedBy: Crossplane
      Product: OpenShift
    policy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "EC2NetworkAndCompute",
            "Effect": "Allow",
            "Action": [
              "ec2:*",
              "elasticloadbalancing:*",
              "autoscaling:*",
              "tag:GetResources",
              "tag:UntagResources"
            ],
            "Resource": "*"
          },
          {
            "Sid": "IAMRoleManagement",
            "Effect": "Allow",
            "Action": [
              "iam:AddRoleToInstanceProfile",
              "iam:CreateInstanceProfile",
              "iam:CreateRole",
              "iam:DeleteInstanceProfile",
              "iam:DeleteRole",
              "iam:DeleteRolePolicy",
              "iam:GetInstanceProfile",
              "iam:GetRole",
              "iam:GetRolePolicy",
              "iam:GetUser",
              "iam:ListInstanceProfilesForRole",
              "iam:ListRoles",
              "iam:ListUsers",
              "iam:PassRole",
              "iam:PutRolePolicy",
              "iam:RemoveRoleFromInstanceProfile",
              "iam:SimulatePrincipalPolicy",
              "iam:TagInstanceProfile",
              "iam:TagRole",
              "iam:UntagRole",
              "iam:ListAttachedRolePolicies",
              "iam:ListInstanceProfiles",
              "iam:ListRolePolicies",
              "iam:ListUserPolicies",
              "iam:AttachUserPolicy",
              "iam:CreateAccessKey",
              "iam:CreateUser",
              "iam:DeleteAccessKey",
              "iam:DeleteUser",
              "iam:DeleteUserPolicy",
              "iam:DetachUserPolicy",
              "iam:GetUserPolicy",
              "iam:ListAccessKeys",
              "iam:ListAttachedUserPolicies",
              "iam:PutUserPolicy",
              "iam:TagUser"
            ],
            "Resource": "*"
          },
          {
            "Sid": "S3ClusterState",
            "Effect": "Allow",
            "Action": [
              "s3:CreateBucket",
              "s3:DeleteBucket",
              "s3:GetAccelerateConfiguration",
              "s3:GetBucketAcl",
              "s3:GetBucketCors",
              "s3:GetBucketLocation",
              "s3:GetBucketLogging",
              "s3:GetBucketObjectLockConfiguration",
              "s3:GetBucketPolicy",
              "s3:GetBucketRequestPayment",
              "s3:GetBucketTagging",
              "s3:GetBucketVersioning",
              "s3:GetBucketWebsite",
              "s3:GetEncryptionConfiguration",
              "s3:GetLifecycleConfiguration",
              "s3:GetReplicationConfiguration",
              "s3:ListBucket",
              "s3:PutBucketAcl",
              "s3:PutBucketPolicy",
              "s3:PutBucketTagging",
              "s3:PutEncryptionConfiguration",
              "s3:AbortMultipartUpload",
              "s3:GetBucketPublicAccessBlock",
              "s3:ListBucketMultipartUploads",
              "s3:PutBucketPublicAccessBlock",
              "s3:PutLifecycleConfiguration",
              "s3:DeleteObject",
              "s3:GetObject",
              "s3:GetObjectAcl",
              "s3:GetObjectTagging",
              "s3:GetObjectVersion",
              "s3:PutObject",
              "s3:PutObjectAcl",
              "s3:PutObjectTagging",
              "s3:ListBucketVersions"
            ],
            "Resource": "*"
          },
          {
            "Sid": "Route53DNS",
            "Effect": "Allow",
            "Action": [
              "route53:ChangeResourceRecordSets",
              "route53:ChangeTagsForResource",
              "route53:CreateHostedZone",
              "route53:DeleteHostedZone",
              "route53:GetChange",
              "route53:GetHostedZone",
              "route53:ListHostedZones",
              "route53:ListHostedZonesByName",
              "route53:ListResourceRecordSets",
              "route53:ListTagsForResource",
              "route53:UpdateHostedZoneComment"
            ],
            "Resource": "*"
          },
          {
            "Sid": "ServiceQuotas",
            "Effect": "Allow",
            "Action": [
              "servicequotas:ListAWSDefaultServiceQuotas"
            ],
            "Resource": "*"
          }
        ]
      }
