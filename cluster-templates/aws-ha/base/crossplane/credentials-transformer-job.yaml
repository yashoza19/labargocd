---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aws-credentials-transformer
subjects:
  - kind: ServiceAccount
    name: aws-credentials-transformer
    namespace: cluster-placeholder
---
apiVersion: batch/v1
kind: Job
metadata:
  name: aws-credentials-transformer
  namespace: cluster-placeholder
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      name: aws-credentials-transformer
    spec:
      serviceAccountName: aws-credentials-transformer
      restartPolicy: OnFailure
      containers:
        - name: transformer
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for Crossplane-generated secret..."
              # Wait for the secret to exist and be populated
              until kubectl get secret aws-credentials-raw -n $NAMESPACE &>/dev/null; do
                echo "Waiting for aws-credentials-raw secret..."
                sleep 5
              done

              echo "Extracting credentials from Crossplane secret..."
              # Extract the access key ID and secret access key from Crossplane secret
              # Crossplane uses 'username' and 'password' as key names
              ACCESS_KEY_ID=$(kubectl get secret aws-credentials-raw -n $NAMESPACE -o jsonpath='{.data.username}')
              SECRET_ACCESS_KEY=$(kubectl get secret aws-credentials-raw -n $NAMESPACE -o jsonpath='{.data.password}')

              # Verify we got the credentials
              if [ -z "$ACCESS_KEY_ID" ] || [ -z "$SECRET_ACCESS_KEY" ]; then
                echo "ERROR: Failed to extract credentials from aws-credentials-raw secret"
                echo "Secret contents:"
                kubectl get secret aws-credentials-raw -n $NAMESPACE -o yaml
                exit 1
              fi

              echo "Creating aws-credentials secret in Hive format..."
              # Create the secret in the format expected by Hive
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: aws-credentials
                namespace: $NAMESPACE
              type: Opaque
              data:
                aws_access_key_id: $ACCESS_KEY_ID
                aws_secret_access_key: $SECRET_ACCESS_KEY
              EOF

              echo "Successfully created aws-credentials secret!"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
